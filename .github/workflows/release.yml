name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: battery_monitor.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: battery_monitor
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: battery_monitor

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary with target suffix
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          ext="${{ matrix.binary == 'battery_monitor.exe' && '.exe' || '' }}"
          cp "$src" "battery_monitor-${{ matrix.target }}$ext"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: battery_monitor-${{ matrix.target }}*
